  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Modern Job Listing Design</title>
      <script type="module" crossorigin src="./assets/index-s59om0Yj.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/index-Coq4vXBm.css">
    </head>
    <body>
      <div id="root"></div>
      <script>
        // О нашей работе: убрать рамку у карточек, оставить только разделительные линии
        function fixWorkCards() {
          const cardGrids = Array.from(document.querySelectorAll('.grid.gap-4')).filter(g => {
            return g.querySelector('.w-9') && !g.closest('.unified-cards');
          });
          if (cardGrids.length >= 2 && !document.querySelector('.unified-cards')) {
            const g1 = cardGrids[0];
            const g2 = cardGrids[1];
            if (g1.parentNode === g2.parentNode) {
              const wrapper = document.createElement('div');
              wrapper.className = 'unified-cards';
              wrapper.style.cssText = 'border-radius:16px;overflow:hidden;';
              g1.parentNode.insertBefore(wrapper, g1);
              wrapper.appendChild(g1);
              wrapper.appendChild(g2);

              // Убрать gap между строками
              g1.style.marginBottom = '0';
              g2.style.marginTop = '0';

              // Горизонтальный разделитель между двумя строками
              g1.style.borderBottom = '1px solid rgba(255,255,255,0.1)';

              // Вертикальный разделитель между колонками
              [g1, g2].forEach(grid => {
                grid.style.gap = '0';
                const cols = grid.querySelectorAll('[class*="rounded"]');
                if (cols.length >= 2) {
                  cols[0].style.borderRight = '1px solid rgba(255,255,255,0.1)';
                }
              });
            }
          }
        }

        document.addEventListener('click', () => setTimeout(fixWorkCards, 200));
        const obs = new MutationObserver(fixWorkCards);
        setTimeout(() => {
          obs.observe(document.body, { childList: true, subtree: true });
          fixWorkCards();
        }, 500);
        setTimeout(fixWorkCards, 1500);
      </script>
    </body>
  </html>
