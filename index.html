  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Modern Job Listing Design</title>
      <script type="module" crossorigin src="./assets/index-s59om0Yj.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/index-Coq4vXBm.css">

      <style>
        /* ── Fix 1: The absolute inset-0 gradient overlay blocks all clicks inside cards.
           It's purely decorative — disable pointer events on it. ── */
        .group.relative > div[class*="absolute"][class*="inset-0"],
        .group.relative > div.absolute.inset-0 {
          pointer-events: none !important;
        }
        /* Broader catch: any absolute inset-0 inside a group card */
        .group > .absolute.inset-0 {
          pointer-events: none !important;
        }

        /* ── Fix 2: Email link — ensure it's on top and interactive ── */
        .text-slate-500 a,
        a[href*="mail.google.com"],
        a[href*="mailto"] {
          pointer-events: auto !important;
          cursor: pointer !important;
          position: relative !important;
          z-index: 10 !important;
        }
      </style>
    </head>

    <body>
      <div id="root"></div>

      <script>
        function applyFixes() {
          // Fix 1: disable pointer events on all absolute inset-0 overlay divs
          document.querySelectorAll('.group').forEach(group => {
            group.querySelectorAll(':scope > div').forEach(child => {
              if (child.classList.contains('absolute') &&
                  (child.classList.contains('inset-0') ||
                   child.style.inset === '0px' ||
                   (child.offsetWidth === group.offsetWidth && child.offsetHeight === group.offsetHeight))) {
                child.style.pointerEvents = 'none';
              }
            });
          });

          // Also: any div with class containing "absolute inset-0" anywhere in cards
          document.querySelectorAll('div[class*="absolute"][class*="inset-0"]').forEach(el => {
            el.style.pointerEvents = 'none';
          });

          // Fix 2: make email links fully clickable
          document.querySelectorAll('a').forEach(a => {
            if (a.href && (a.href.includes('mail.google.com') || a.href.startsWith('mailto'))) {
              a.style.pointerEvents = 'auto';
              a.style.cursor = 'pointer';
              a.style.position = 'relative';
              a.style.zIndex = '20';
            }
          });

          // Fix 3: О нашей работе — merge 4 cards into 1 unified container
          const cardGrids = Array.from(document.querySelectorAll('.grid.gap-4')).filter(g => {
            return g.querySelector('.w-9') && !g.closest('.unified-cards');
          });

          if (cardGrids.length >= 2 && !document.querySelector('.unified-cards')) {
            const g1 = cardGrids[0];
            const g2 = cardGrids[1];
            // Only merge if they share the same parent
            if (g1.parentNode === g2.parentNode) {
              const parent = g1.parentNode;
              const wrapper = document.createElement('div');
              wrapper.className = 'unified-cards';
              wrapper.style.cssText = `
                border-radius: 18px;
                border: 1px solid rgba(255,255,255,0.1);
                background: rgba(255,255,255,0.04);
                overflow: hidden;
              `;
              parent.insertBefore(wrapper, g1);
              wrapper.appendChild(g1);
              wrapper.appendChild(g2);

              wrapper.querySelectorAll('.rounded-2xl').forEach(card => {
                card.style.borderRadius = '0';
                card.style.border = 'none';
                card.style.background = 'transparent';
              });

              g1.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
              [g1, g2].forEach(grid => {
                const cards = grid.querySelectorAll('.rounded-2xl');
                if (cards[0]) cards[0].style.borderRight = '1px solid rgba(255,255,255,0.08)';
              });
            }
          }
        }

        // Re-run on every click (panels open/close dynamically)
        document.addEventListener('click', () => setTimeout(applyFixes, 200));

        // Initial runs
        const obs = new MutationObserver(() => applyFixes());
        setTimeout(() => {
          obs.observe(document.body, { childList: true, subtree: true });
          applyFixes();
        }, 500);
        setTimeout(applyFixes, 1200);
        setTimeout(applyFixes, 2500);
      </script>
    </body>
  </html>
